spring:
  application:
    name: broker-gateway-service
  jpa:
    hibernate:
      ddl-auto: none
  kafka:
    consumer:
      group-id: broker-gateway-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

gateway:
  messaging:
    kafka:
      consumer-enabled: false
    outbox:
      enabled: false
      batch-size: 50
      lock-ttl: 30s
      publish-timeout: 10s
      initial-retry-delay: 1s
      max-retry-delay: 5m
      retry-backoff-multiplier: 2.0
      max-retry-count: 12
      poll-delay-ms: 1000
  broker:
    code: SIM
    host: 127.0.0.1
    port: 9093
    command-dispatch-enabled: false
    command-dispatch-poll-delay-ms: 250
    command-dispatch-lease-timeout-ms: 30000
    command-dispatch-batch-size: 25
