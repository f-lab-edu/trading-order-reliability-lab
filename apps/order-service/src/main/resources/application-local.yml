server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: trading_app
    password: trading_app
    driver-class-name: com.mysql.cj.jdbc.Driver
  kafka:
    bootstrap-servers: localhost:19092,localhost:29092,localhost:39092

order-service:
  messaging:
    kafka:
      topic-bootstrap-enabled: true
      broker-event-consumer-enabled: true
    outbox:
      enabled: true
